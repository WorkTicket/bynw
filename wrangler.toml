name = "bynmwcreative"
main = ".open-next/worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

routes = [
  { pattern = "bynmwcreative.com", custom_domain = true },
  { pattern = "www.bynmwcreative.com", custom_domain = true },
]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[vars]
NEXT_PUBLIC_SITE_URL = "https://bynmwcreative.com"
CONTACT_EMAIL = "bynw808@gmail.com"

# Secrets (set via `wrangler secret put`):
# MAILCHIMP_API_KEY, MAILCHIMP_AUDIENCE_ID
# GMAIL_CONTACT_WEBHOOK_URL, GMAIL_CONTACT_WEBHOOK_TOKEN  (contact form → bynw808@gmail.com)
# RESEND_API_KEY  (optional fallback for contact form)
