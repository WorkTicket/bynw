name = "bynmwcreative"
main = ".open-next/worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

routes = [
  { pattern = "bynmwcreative.com", custom_domain = true },
  { pattern = "www.bynmwcreative.com", custom_domain = true },
]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[vars]
NEXT_PUBLIC_SITE_URL = "https://bynmwcreative.com"
NEXT_PUBLIC_GSC_VERIFICATION = "googleb0de3a7eb0c354a5.html"

# Secrets (set via `wrangler secret put`):
# MAILCHIMP_API_KEY, MAILCHIMP_AUDIENCE_ID
